<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="0">
  <meta name="theme-color" content="#fafaf9">
  <title>2026年度 2Q 教養科目シラバス | 神戸大学 電気電子工学科</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <h1>教養科目シラバス</h1>
      </div>
      <p class="subtitle">神戸大学 電気電子工学科 / 2026年度 2Q / 全学共通授業科目</p>
    </div>
  </header>

  <section class="controls">
    <div class="search">
      <input type="search" id="search-input" placeholder="科目名・教員・コード・テーマで検索…" autocomplete="off" spellcheck="false">
      <kbd class="search-key" id="search-key">/</kbd>
      <button type="button" class="search-clear" id="search-clear" aria-label="クリア" hidden>×</button>
      <span class="search-count" id="search-count" aria-live="polite" hidden>0件</span>
      <ul class="suggest" id="suggest" role="listbox" hidden></ul>
    </div>
    <div class="filters" role="tablist" aria-label="カテゴリフィルタ">
      <button type="button" class="filter-btn active" data-cat="all" role="tab">
        <span>すべて</span>
      </button>
      <button type="button" class="filter-btn" data-cat="人文系" role="tab">
        <span class="dot" aria-hidden="true"></span><span>人文</span>
      </button>
      <button type="button" class="filter-btn" data-cat="社会系" role="tab">
        <span class="dot" aria-hidden="true"></span><span>社会</span>
      </button>
      <button type="button" class="filter-btn" data-cat="総合系" role="tab">
        <span class="dot" aria-hidden="true"></span><span>総合</span>
      </button>
    </div>
  </section>

  <nav class="day-tabs" id="day-tabs" aria-label="曜日切替（スマホ表示用）">
    <button type="button" class="day-tab active" data-day="月">月</button>
    <button type="button" class="day-tab" data-day="火">火</button>
    <button type="button" class="day-tab" data-day="水">水</button>
    <button type="button" class="day-tab" data-day="木">木</button>
    <button type="button" class="day-tab" data-day="金">金</button>
  </nav>

  <main>
    <section class="block timetable-wrap">
      <div class="block-header">
        <h2 class="section-title">週の時間割</h2>
        <span class="section-count" id="weekly-count">0 科目</span>
      </div>
      <div class="timetable" id="timetable" data-active-day="月" role="grid" aria-label="時間割">
        <div class="th th-corner"></div>
        <div class="th th-day col-月" data-day="月">月</div>
        <div class="th th-day col-火" data-day="火">火</div>
        <div class="th th-day col-水" data-day="水">水</div>
        <div class="th th-day col-木" data-day="木">木</div>
        <div class="th th-day col-金" data-day="金">金</div>
        <!-- セルは app.js が動的に生成 -->
      </div>
      <p class="empty-msg" id="timetable-empty" hidden>該当する科目はありません</p>
    </section>

    <section class="block intensive-wrap">
      <div class="block-header">
        <h2 class="section-title">集中講義・特殊枠</h2>
        <span class="section-count" id="intensive-count">0 科目</span>
      </div>
      <div class="intensive" id="intensive"></div>
      <p class="empty-msg" id="intensive-empty" hidden>該当する科目はありません</p>
    </section>
  </main>

  <dialog id="course-modal" class="modal" aria-labelledby="modal-title">
    <button type="button" class="modal-close" aria-label="閉じる">×</button>
    <div class="modal-body" id="modal-body"></div>
  </dialog>

  <!-- 履修候補 / Schedule builder -->
  <button type="button" class="schedule-fab" id="schedule-fab" aria-label="履修候補を開く">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    <span class="fab-label">履修候補</span>
    <span class="fab-count" id="fab-count">0</span>
    <span class="fab-credits" id="fab-credits">0.0単位</span>
  </button>

  <div class="panel-overlay" id="panel-overlay" hidden></div>

  <aside class="schedule-panel" id="schedule-panel" aria-hidden="true" aria-label="履修候補">
    <header class="panel-header">
      <div class="panel-title-row">
        <h2>履修候補</h2>
        <button type="button" class="panel-close" id="panel-close" aria-label="閉じる">×</button>
      </div>
      <div class="panel-stats">
        <span class="ps-pair"><strong id="panel-total-count">0</strong><span>科目</span></span>
        <span class="dot-sep" aria-hidden="true"></span>
        <span class="ps-pair"><strong id="panel-total-credits">0.0</strong><span>単位</span></span>
      </div>
      <div class="panel-cat-totals">
        <div class="panel-cat-total" data-cat="人文系">
          <span class="pct-label">人文</span>
          <strong id="cat-人文系-credits">0.0</strong><span class="unit">単位</span>
        </div>
        <div class="panel-cat-total" data-cat="社会系">
          <span class="pct-label">社会</span>
          <strong id="cat-社会系-credits">0.0</strong><span class="unit">単位</span>
        </div>
        <div class="panel-cat-total" data-cat="総合系">
          <span class="pct-label">総合</span>
          <strong id="cat-総合系-credits">0.0</strong><span class="unit">単位</span>
        </div>
      </div>
    </header>

    <div class="panel-body" id="panel-body">
      <!-- mini grid + list rendered by app.js -->
    </div>

    <footer class="panel-footer">
      <button type="button" id="panel-clear">すべてクリア</button>
      <button type="button" id="panel-share" class="primary">URLでシェア</button>
    </footer>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <footer class="site-footer">
    <p>参照元 <a href="https://kym22-web.ofc.kobe-u.ac.jp/kobe_syllabus/2026/20/" target="_blank" rel="noopener">神戸大学 シラバスシステム</a> ／ 2026年4月16日時点</p>
  </footer>

  <script src="app.js?v=6"></script>
</body>
</html>
